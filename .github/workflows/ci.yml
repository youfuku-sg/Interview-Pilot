name: "ci"

on:
  workflow_dispatch:
  push:
  pull_request:
    branches:
      - "main"

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install frontend deps
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

  rust:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Check formatting
        working-directory: src-tauri
        run: cargo fmt --check

      - name: Clippy
        working-directory: src-tauri
        run: cargo clippy

  verify-tag-on-main:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    outputs:
      on_main: ${{ steps.check.outputs.on_main }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check tag is on main
        id: check
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual workflow_dispatch run, skipping main-branch check."
            echo "on_main=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git fetch origin main
          if git merge-base --is-ancestor "${{ github.sha }}" origin/main; then
            echo "Tag ${{ github.ref_name }} (${{ github.sha }}) is on main. Proceeding with build."
            echo "on_main=true" >> "$GITHUB_OUTPUT"
          else
            echo "Tag ${{ github.ref_name }} (${{ github.sha }}) is NOT on main. Skipping build."
            echo "on_main=false" >> "$GITHUB_OUTPUT"
          fi

  publish-tauri:
    needs: [frontend, rust, verify-tag-on-main]
    if: success() && needs.verify-tag-on-main.outputs.on_main == 'true'
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "windows-latest"
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend deps
        run: npm ci

      - name: Extract changelog for this version
        id: changelog
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          BODY=$(awk -v ver="$VERSION" '
            /^## \[/{
              if (found) exit
              if ($0 ~ "\\[" ver "\\]") { found=1; next }
              next
            }
            found { print }
          ' CHANGELOG.md)
          if [ -z "$(echo "$BODY" | tr -d '[:space:]')" ]; then
            BODY="Windows installer build for personal testing. Download the attached NSIS/MSI installer from this draft release and verify it locally before publishing."
          fi
          {
            echo "body<<CHANGELOG_EOF"
            echo "$BODY"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build & publish
        uses: tauri-apps/tauri-action@v0.5.16
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: "Interview-Pilot v__VERSION__"
          releaseBody: ${{ steps.changelog.outputs.body }}
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: false
          args: ${{ matrix.args }}
